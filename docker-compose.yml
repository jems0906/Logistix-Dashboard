services:
  postgres:
    image: postgres:16
    container_name: logistix-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: logistix
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d logistix"]
      interval: 5s
      timeout: 5s
      retries: 20

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: logistix-dashboard
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/logistix
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
