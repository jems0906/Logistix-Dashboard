services:

  - type: web
    name: logistix-dashboard
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash scripts/start_render.sh
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        value: sqlite:////tmp/warehouse.db
      - key: PYTHONUNBUFFERED
        value: "1"
