services:
  - type: pserv
    name: logistix-postgres
    env: postgres
    plan: free
    postgresMajorVersion: "16"
    ipAllowList: []

  - type: web
    name: logistix-dashboard
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash scripts/start_render.sh
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: logistix-postgres
          property: connectionString
      - key: PYTHONUNBUFFERED
        value: "1"
